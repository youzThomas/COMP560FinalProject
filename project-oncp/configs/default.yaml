# Default configuration for the Newness Transformer on the Mill dataset.
# Mirrors the midterm report: dual-head detector with PAM + energy gate.

seed: 42
device: auto   # auto | cpu | cuda

data:
  mat_path: data/raw/dataset_a.mat
  labels_csv: data/processed/labels_with_tool_class.csv
  window_size: 64
  stride: 64
  drop_bad_cuts: [17, 94]
  # Class 2 (Failed) is rare; hold it out as the "unknown" for open-world eval.
  # Training sees only known_classes; test evaluates unknown discovery on class 2.
  known_classes: [0, 1]
  unknown_classes: [2]
  val_fraction: 0.15
  test_fraction: 0.15
  batch_size: 128
  num_workers: 0

model:
  in_channels: 6          # Overridden at runtime from data
  patch_size: 8           # window_size must be divisible
  d_model: 128
  n_heads: 4
  n_encoder_layers: 3
  n_decoder_layers: 2
  num_queries: 4
  dropout: 0.1
  # Prototype-Attention Memory
  pam_prototypes_per_class: 2
  pam_proto_dim: 128
  # Scoring
  energy_temperature: 1.0
  # Energy dominates the fused score because on this dataset the distance
  # component (AUROC ~0.51) is close to random while energy (AUROC ~0.60)
  # actually separates knowns from unknowns.
  fusion_alpha: 0.75      # weight on energy in the fused newness score
  # Thresholds (used for default inference; swept in evaluation)
  objectness_threshold: 0.5
  newness_threshold: 0.0  # in z-score space (set after calibration)

training:
  epochs: 40
  lr: 3.0e-4
  weight_decay: 1.0e-4
  warmup_epochs: 2
  grad_clip: 1.0
  # Loss weights
  w_class: 1.0
  w_objectness: 1.0
  # Previous 0.02 paired with log-compression made the energy margin term
  # effectively untrained; bump it so the OOD signal gets real gradient.
  w_energy: 0.1
  w_proto: 0.25
  # Energy margin loss: push known in-dist energy low and surrogate "unknown" (unmatched
  # queries / background) energy high.
  energy_m_in: -4.5
  energy_m_out: -2.0
  # Prototype EMA update momentum
  proto_ema: 0.9
  # Acceptance criteria targets (used by threshold selection and checkpoint scoring).
  target_unknown_precision: 0.35
  target_known_recall: 0.80
  target_unknown_recall: 0.35
  log_every: 20
  ckpt_dir: runs/default
