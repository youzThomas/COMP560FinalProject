# Default configuration for the Newness Transformer on the Mill dataset.
# Mirrors the midterm report: dual-head detector with PAM + energy gate.

seed: 42
device: auto   # auto | cpu | cuda

data:
  mat_path: data/raw/dataset_a.mat
  labels_csv: data/processed/labels_with_tool_class.csv
  window_size: 64
  stride: 64
  drop_bad_cuts: [17, 94]
  # Class 2 (Failed) is rare; hold it out as the "unknown" for open-world eval.
  # Training sees only known_classes; test evaluates unknown discovery on class 2.
  known_classes: [0, 1]
  unknown_classes: [2]
  val_fraction: 0.15
  test_fraction: 0.15
  batch_size: 128
  num_workers: 0

model:
  in_channels: 6          # Overridden at runtime from data
  patch_size: 8           # window_size must be divisible
  d_model: 128
  n_heads: 4
  n_encoder_layers: 3
  n_decoder_layers: 2
  num_queries: 4
  dropout: 0.1
  # Prototype-Attention Memory
  pam_prototypes_per_class: 2
  pam_proto_dim: 128
  # Scoring
  energy_temperature: 1.0
  # newness = fusion_alpha * energy_z + fusion_msp * msp_z + (1-alpha-msp) * dist_z
  # On this dataset energy alone (AUROC ~0.63) beat both distance (AUROC ~0.55)
  # and the MSP-augmented fusion (AUROC ~0.58); MSP degenerates to a noisy
  # function of the class-margin for K=2 and its running z-score oscillates
  # across epochs, so we disable it and let dist contribute only slightly.
  fusion_alpha: 0.85
  fusion_msp: 0.0
  # Thresholds (used for default inference; swept in evaluation)
  objectness_threshold: 0.5
  newness_threshold: 0.0  # in z-score space (set after calibration)

training:
  epochs: 40
  lr: 3.0e-4
  weight_decay: 1.0e-4
  warmup_epochs: 2
  grad_clip: 1.0
  # Loss weights
  w_class: 1.0
  w_objectness: 1.0
  # Previous 0.02 paired with log-compression made the energy margin term
  # effectively untrained; bump it so the OOD signal gets real gradient.
  w_energy: 0.1
  w_proto: 0.25
  # Tail-extrapolation Virtual Outlier Synthesis: PERMANENTLY OFF.
  # Run 44453745 proved this formulation is structurally wrong: synthetic
  # features q_tail = q + alpha*(q - class_center) extrapolate *along* the
  # sample's dominant class direction. Because class_head is roughly linear,
  # q_tail has a LARGER max-logit than q and therefore LOWER free energy
  # than q, which is the opposite of what the hinge loss assumes. Turning
  # VOS on at epoch 9 (after the 8-epoch warmup) caused vos=7.547 on the
  # first active epoch and permanently collapsed the classifier. No choice
  # of w_vos / vos_alpha / vos_m_out recovers from this: the gradient
  # direction is wrong. The knobs are kept for code compatibility but the
  # loss path is now guaranteed inactive. A correct re-implementation would
  # sample synthetic outliers *orthogonal* to the class direction (e.g.,
  # Gaussian noise in the PAM-prototype null space) or fit per-class
  # Gaussians and sample from their low-likelihood Mahalanobis tails.
  w_vos: 0.0
  vos_m_out: 1.5
  vos_alpha: 1.5
  vos_warmup_epochs: 8
  # Per-sample Gaussian noise added to the training input signals. Scales with
  # each sample's own stddev so it does not drown out the weaker channels. A
  # light amount (~3%) acts as the only data augmentation on a dataset that
  # otherwise overfits to the known-class manifold very quickly.
  input_noise_std: 0.03
  # Stop training if val score stops improving for this many epochs. The best
  # checkpoint is already saved to disk so this only cuts wasted compute and
  # avoids the late-epoch collapse we saw after ~epoch 17 in prior runs.
  early_stop_patience: 10
  # Exponential moving average of the model weights. A parallel snapshot is
  # updated every optimizer step with momentum model_ema_decay and saved as
  # best_ema.pt whenever its val score beats the live model. The final report
  # picks whichever of {best.pt, best_ema.pt} scores higher on val. Typically
  # adds 1-3 AUROC points on small datasets without touching training dynamics.
  # Set model_ema_decay: 0 to disable.
  model_ema_decay: 0.999
  # Energy margin loss: push known in-dist energy low and surrogate "unknown" (unmatched
  # queries / background) energy high.
  energy_m_in: -5.0
  energy_m_out: 0.0
  # Explicit rank loss between matched (low) and unmatched (high) energies.
  # Keeps the classifier producing a monotone OOD signal even when the absolute
  # energy drifts during training.
  energy_rank_margin: 1.0
  energy_log_compress: false
  # Slight label smoothing stops the classifier from saturating on Degraded, which
  # was making Failed samples get *lower* energy than Healthy samples.
  cls_label_smoothing: 0.05
  # Prototype EMA update momentum
  proto_ema: 0.9
  # Acceptance criteria targets (used by threshold selection and checkpoint scoring).
  # target_known_recall was briefly pushed to 0.815 as a val-to-test drift buffer,
  # but run 44460876 measured that drift at only -0.003 on known_recall, while
  # the 0.815 floor was pinning the threshold chooser and costing us unknown
  # recall (the sweep in runs/default/threshold_sweep.json shows test rec=0.17
  # at known=0.80 vs rec=0.16 at known=0.815). Back to the project target 0.80.
  target_unknown_precision: 0.35
  target_known_recall: 0.80
  target_unknown_recall: 0.35
  log_every: 20
  ckpt_dir: runs/default
